<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3M Admin — Pro Claims</title>
<meta name="robots" content="noindex, nofollow">
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0A0E1A;color:#e8ecf5;padding:20px;max-width:720px;margin:0 auto;}
  h1{font-size:1.3rem;margin-bottom:4px;}
  .sub{color:#8892a8;font-size:.85rem;margin-bottom:24px;}
  #signin-gate{text-align:center;padding:80px 20px;}
  #signin-btn{background:#F5C518;color:#000;border:none;padding:12px 24px;border-radius:10px;font-weight:700;font-size:.9rem;cursor:pointer;}
  #app{display:none;}
  .claim{background:#141a2e;border:1px solid #232a42;border-radius:12px;padding:16px;margin-bottom:12px;}
  .claim-row{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;}
  .claim-code{font-family:monospace;font-size:1.1rem;font-weight:700;color:#F5C518;}
  .claim-meta{font-size:.78rem;color:#8892a8;margin-top:4px;line-height:1.6;}
  .claim-actions{display:flex;gap:8px;margin-top:12px;}
  .btn{border:none;border-radius:8px;padding:8px 16px;font-size:.8rem;font-weight:700;cursor:pointer;}
  .btn-approve{background:#2ECC71;color:#000;}
  .btn-reject{background:#E84855;color:#fff;}
  .btn:disabled{opacity:.4;cursor:not-allowed;}
  .empty{text-align:center;padding:60px 20px;color:#8892a8;}
  .status-pill{font-size:.65rem;font-weight:700;text-transform:uppercase;padding:3px 8px;border-radius:100px;}
  .status-pending{background:rgba(245,197,24,.15);color:#F5C518;}
  .status-approved{background:rgba(46,204,113,.15);color:#2ECC71;}
  .status-rejected{background:rgba(232,72,85,.15);color:#E84855;}
  #error-banner{background:#E84855;color:#fff;padding:10px 16px;border-radius:8px;margin-bottom:16px;font-size:.82rem;display:none;}
</style>
</head>
<body>

<div id="signin-gate">
  <h1>3M Admin</h1>
  <p class="sub">Sign in with your admin Google account to review Pro payment claims.</p>
  <button id="signin-btn">Sign in with Google</button>
</div>

<div id="app">
  <h1>Pro Claims</h1>
  <p class="sub">Verify each M-Pesa code against your statement before approving. Approving sets <code>premium: true</code> on the user's account.</p>
  <div id="error-banner"></div>
  <div id="claims-list"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyAB6xsmjLxkZpFcxJPJPMwJeVkBz0Wd01s",
  authDomain: "biz-3mt.firebaseapp.com",
  projectId: "biz-3mt",
  storageBucket: "biz-3mt.firebasestorage.app",
  messagingSenderId: "635132245018",
  appId: "1:635132245018:web:d22978d041344ffe2e0da3",
  measurementId: "G-X2MT0ZPWJK"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const provider = new GoogleAuthProvider();

const FS_BASE = `https://firestore.googleapis.com/v1/projects/${firebaseConfig.projectId}/databases/default/documents`;

function showError(msg) {
  const banner = document.getElementById("error-banner");
  banner.textContent = msg;
  banner.style.display = "block";
}

document.getElementById("signin-btn").addEventListener("click", () => {
  signInWithPopup(auth, provider).catch(e => showError("Sign-in failed: " + e.message));
});

onAuthStateChanged(auth, async (user) => {
  if (!user) {
    document.getElementById("signin-gate").style.display = "block";
    document.getElementById("app").style.display = "none";
    return;
  }
  document.getElementById("signin-gate").style.display = "none";
  document.getElementById("app").style.display = "block";
  await loadClaims(user);
});

async function loadClaims(user) {
  const listEl = document.getElementById("claims-list");
  listEl.innerHTML = `<div class="empty">Loading…</div>`;
  try {
    const token = await user.getIdToken();
    const res = await fetch(`${FS_BASE}/pending_claims?pageSize=100`, {
      headers: { "Authorization": `Bearer ${token}` }
    });
    if (res.status === 403) {
      // Expected if this account isn't the admin email in the Firestore rules —
      // the read is denied server-side rather than silently returning nothing.
      listEl.innerHTML = "";
      showError("Access denied — this Google account isn't set as the admin email in your Firestore rules.");
      return;
    }
    const data = await res.json();
    const docs = data.documents || [];
    if (!docs.length) {
      listEl.innerHTML = `<div class="empty">No pending claims right now.</div>`;
      return;
    }
    // Sort newest first
    docs.sort((a,b) => (b.fields?.submittedAt?.stringValue||"").localeCompare(a.fields?.submittedAt?.stringValue||""));

    listEl.innerHTML = docs.map(d => {
      const f = d.fields || {};
      const claimId = d.name.split("/").pop();
      const status = f.status?.stringValue || "pending";
      return `
      <div class="claim" data-id="${claimId}" data-uid="${f.uid?.stringValue||''}">
        <div class="claim-row">
          <div>
            <div class="claim-code">${f.txnCode?.stringValue || claimId}</div>
            <div class="claim-meta">
              ${f.email?.stringValue || "(no email)"}<br>
              UID: ${f.uid?.stringValue || "?"}<br>
              Submitted: ${f.submittedAt?.stringValue ? new Date(f.submittedAt.stringValue).toLocaleString() : "?"}
            </div>
          </div>
          <span class="status-pill status-${status}">${status}</span>
        </div>
        ${status === "pending" ? `
        <div class="claim-actions">
          <button class="btn btn-approve" onclick="window.approveClaim('${claimId}','${f.uid?.stringValue||''}')">✅ Verified — Approve</button>
          <button class="btn btn-reject" onclick="window.rejectClaim('${claimId}')">✕ Reject</button>
        </div>` : ''}
      </div>`;
    }).join("");
  } catch(e) {
    listEl.innerHTML = "";
    showError("Failed to load claims: " + e.message);
  }
}

async function patchDoc(collection, docId, fields, token) {
  const fsFields = {};
  for (const [k,v] of Object.entries(fields)) {
    if (typeof v === "boolean") fsFields[k] = { booleanValue: v };
    else fsFields[k] = { stringValue: String(v) };
  }
  const mask = Object.keys(fields).map(k => `updateMask.fieldPaths=${k}`).join("&");
  const res = await fetch(`${FS_BASE}/${collection}/${docId}?${mask}`, {
    method: "PATCH",
    headers: { "Authorization": `Bearer ${token}`, "Content-Type": "application/json" },
    body: JSON.stringify({ fields: fsFields })
  });
  return res.json();
}

window.approveClaim = async (claimId, uid) => {
  if (!uid) { showError("This claim has no linked user UID — can't approve."); return; }
  if (!confirm(`Confirm you've checked your M-Pesa statement for this transaction, and grant Pro to UID ${uid}?`)) return;
  try {
    const token = await auth.currentUser.getIdToken();
    // Order matters: grant premium first, then mark the claim approved —
    // if the second call fails, the user still correctly has Pro and the
    // claim can be manually marked later without re-doing the grant.
    const userResult = await patchDoc("users", uid, { premium: true }, token);
    if (userResult.error) {
      showError("Failed to grant Pro: " + userResult.error.message + " — check your Firestore rules allow your admin email to update users/premium.");
      return;
    }
    await patchDoc("pending_claims", claimId, { status: "approved" }, token);
    await loadClaims(auth.currentUser);
  } catch(e) {
    showError("Approve failed: " + e.message);
  }
};

window.rejectClaim = async (claimId) => {
  if (!confirm("Reject this claim? The user will not be granted Pro.")) return;
  try {
    const token = await auth.currentUser.getIdToken();
    await patchDoc("pending_claims", claimId, { status: "rejected" }, token);
    await loadClaims(auth.currentUser);
  } catch(e) {
    showError("Reject failed: " + e.message);
  }
};
</script>
</body>
</html>
